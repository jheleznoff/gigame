server:
  port: 8000

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gigame
    username: ${DB_USERNAME:gigame}
    password: ${DB_PASSWORD:gigame}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  ai:
    gigachat:
      auth:
        bearer:
          client-id: ${GIGACHAT_CLIENT_ID:}
          client-secret: ${GIGACHAT_CLIENT_SECRET:}
        scope: ${GIGACHAT_SCOPE:GIGACHAT_API_CORP}
        unsafe-ssl: true
      chat:
        options:
          model: ${GIGACHAT_MODEL:GigaChat-2-Max}
          temperature: 0.7
      embedding:
        options:
          model: Embeddings
          dimensions: 1024
      internal:
        unsafe-ssl: true
        connect-timeout: 30s
        read-timeout: 300s

app:
  upload-dir: ${UPLOAD_DIR:./data/uploads}
  cors-origin: ${CORS_ORIGIN:http://localhost:5173}

logging:
  level:
    com.gigame: DEBUG
    org.springframework.web: DEBUG
